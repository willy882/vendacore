name: Keep Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # cada 5 minutos
  workflow_dispatch:        # también se puede lanzar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vendacore-backend.fly.dev/api/v1 --max-time 30)
          echo "Backend alive, status: $STATUS"
